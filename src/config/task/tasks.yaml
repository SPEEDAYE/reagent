    - 字典的 key：所有已经输入需要被修改的需求工件代号
    - 字典的 value：为该工件需要做出的改进说明（简要但具体）

    同时你的输出不应该包含反引号

    这是所有工件对应的代号：
    - 外部事件列表：event_list
    - 特征树：feature_tree
    - 现有解决方案调研：survey
    - 上下文图：context_diagram
    - 用户类以及特征：user_introduction
    - 用例：use_case
    - 非功能性需求：non_functional_requirements
    - 业务范围文档：business_scope

    示例输出（仅示意结构与粒度）：
    {
      "feature_tree": "需要根据新增的核心业务能力重新梳理功能层级，并补充此前遗漏的关键子功能。",
      "context_diagram": "需要引入新的外部系统参与者，并明确系统与外部实体之间新增的数据交互关系。"
    }

    若判断 survey 需要被修改，则示例输出应类似于：
    {
      "survey": "用户反馈表明现有调研未覆盖关键业务场景，需要补充对主流解决方案的能力与限制分析。",
      "feature_tree": "需要基于更新后的问题理解重新调整功能结构，确保功能与真实业务需求对齐。",
      "context_diagram": "需要重新确认系统边界，并调整与外部系统的交互关系。",
      "event_list": "需要补充新的业务触发事件，并修正原有事件定义中的不准确之处。",
      "user_introduction": "需要更新用户角色画像，补充新的用户目标与痛点描述。"
    }

    除字典内容外，不要输出任何解释性文字、标题或额外说明。

  agent: SoftwareManager

BRD_modify_locate_task:
  description: >
    你的任务是为软件项目定位有哪些需求工件需要修改：
    **根据用户反馈，判断哪些需求工件需要被修改**

    以下是用户针对当前 BRD 的历史反馈信息：
    {feedback}
    以下是系统中所有可能涉及的需求工件及其用途说明：
    {reference}

    在分析过程中，请遵守以下步骤：
    1、首先根据用户的反馈定位哪些工件是需要改进的，你可以根据各个工件所包含的内容来进行定位，例如：
      * 如果用户表示出现了多余的或者错误的系统外部实体那么就修改上下文图
