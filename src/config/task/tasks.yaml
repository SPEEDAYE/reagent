    同时你的输出不应该包含反引号

    你只能使用以下工件代号作为 key：
    - 外部事件列表：event_list
    - 特征树：feature_tree
    - 现有解决方案调研：survey
    - 上下文图：context_diagram
    - 用户类以及特征：user_introduction
    - 用例：use_case
    - 非功能性需求：non_functional_requirements
    - 业务范围文档：business_scope

    这是一个输出案例：
    ["user_introduction", "context_diagram", "feature_tree", "non_functional_requirements"]
  agent: SoftwareManager

business_scope_task:
  description: >
    你的任务是：根据我们提供的**需求工件**，编写业务范围文档，业务范围文档应该包含五章：
    - 业务目标（Business Objectives） 
      - 业务目标将产品将要提供的重要业务收益以量化、可衡量的方式进行总结说明，避免空泛的表述以及含糊其辞的改进描述。
    - 成功指标（Success Metrics）
      - 明确利益相关者将用来**定义并衡量本项目成功与否的指标**（Wiegers，2007）。
    - 软件项目主要功能
      - 列出产品的**主要功能或用户能力**。
      - 在列举功能时，应从用户如何实际使用这些功能的角度进行思考，以确保清单**完整**，同时避免包含那些**听起来很有趣但并不能为客户带来价值的多余功能**。
      - 为每一项功能分配一个**唯一且可持续使用的标识符**，以便将其与其他系统要素进行追踪关联。
      - 你应该加入**系统功能树**和**外部事件列表**来进行说明。
    - 限制与排除
      - 列出**利益相关者可能期望但并未计划纳入产品或某一特定版本中的功能或特性**。
      - 应明确记录那些**已从范围中剔除的内容**，以防相关范围决策被遗忘。
      - 在本节中应**明确说明此类排除项**，例如：“新系统将不提供移动平台支持。”
    - 利益相关者画像
      - 利益相关者（Stakeholders）是指积极参与项目、会受到项目结果影响，或能够影响项目结果的个人、群体或组织（Smith 2000；IIBA 2009；PMI 2013）。
      - 利益相关者画像（Stakeholder Profiles）用于描述项目中不同类型的客户以及其他关键利益相关者。你不必描述每一个利益相关者群体，例如在网站开发项目中负责检查法律合规性的法务人员。
      - 应重点关注不同类型的客户、目标市场细分，以及这些细分市场中的各类用户群体，你可以参考**用户类与特征**。

    如果提供了**原先的输出**，你应该根据**用户的修改意见**在你原先输出的基础上进行改进。
    如果没有提供则你可以忽略并重新生成。

    以下是你**原先的输出**：
    {original}
    以下是来自**用户的修改意见**：
    {feedback}
    以下是你可以参考的**需求工件**：
    {reference}
  expected_output: >
    你应该输出一份markdown格式的报告，包含上述章节.
  agent: SoftwareManager

doc_summary_task:
  description: >
    你的任务是：对项目{project_name}中用户提供的**项目资料**，编写摘要和关键词，
    以下是项目的原始需求：{Description},
    # Task
    请阅读提供的文档内容（Markdown格式），并根据预定义的“多维度标签 Schema”为该文档进行标注。
    # Metadata Schema (JSON)
    你必须严格按照以下 JSON 格式输出，不要包含任何多余的解释文字：
    {
      "domain": "string | 参考领域标签：[财务, 技术, 法务, 市场, 人事, 战略, 产品, 其他]",
      "entities": {
        "organizations": ["string | 文档中提到的公司、机构名称"],
        "products_projects": ["string | 产品型号、项目代号、软件名称"],
        "people_roles": ["string | 关键人物姓名或核心职位"]
      },
      "content_type": "string | 识别文档属性（例如：会议纪要, 合同协议, 技术方案, 财务报表, 产品手册, 调研报告）",
      "keywords": ["string | 3-5个反映文档具体核心内容的灵活标签"],
      "summary_brief": "string | 一句话概括文档核心价值（不超过50字）"
    }
    # Tagging Rules
      1. **领域归位**：如果内容涉及跨领域，请选择最核心的一个领域。
      2. **实体识别**：优先提取具有唯一性的专有名词（如 "Project Orion" 而非 "项目"）。
      3. **内容类型判定**：通过文档结构（如是否有条款、是否有时间表、是否有资产负债表）精准判定。
      4. **关键词生成**：
        - 避免泛泛而谈（如“工作”、“报告”）。
        - 聚焦具体技术点、事件或关键指标。
      5. **语言一致性**：标签语言应与文档主体语言保持一致（中文文档使用中文标签）。
    这是我们输入的文件名:
    {key}
