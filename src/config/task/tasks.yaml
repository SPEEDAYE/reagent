competitive_analysis_task:
  description: >
    针对目标产品 {project_name} 开展一份聚焦且数据驱动的竞品分析。
    识别主要竞争对手，从核心功能、定价策略、用户体验、技术栈、市场定位等方面进行对比。
    明确每个竞争对手的优势与弱点，发现市场空缺与潜在机会，
    并给出清晰的建议，说明我们的产品应如何实现差异化并获得竞争优势。
    以下是来自用户的修改意见：
    {feedback}
    以下是项目描述可供参考：
    {Description}。

  expected_output: >
    针对目标产品 {project_name} 产出一份聚焦且数据驱动的竞品分析。
    识别主要竞争对手，并从其核心功能、定价策略、用户体验、技术路线、市场定位等方面进行比较。
    分析每个竞争对手的优势、劣势、机会与威胁（SWOT）。
    强烈建议包含竞争对手痛点的总结，以及这些痛点背后根本原因的分析。
  agent: SoftwareManager

survey_task:
  description: >
    针对目标产品 {project_name} 结合**用户的需求描述**，对现有已有的软件项目进行调研分析。
    你的标准流程包括：
      1、识别市场上主要的类似软件项目，并获取其相关的信息，你应该参考**远景和范围文档的结构**进行软件内容的获取。
      2、从系统特征、外部触发事件、与软件交互的外部实体、用户群体等方面进行对比分析。
      3、还应该探究在这些项目是如何解决与实现用户在需求描述中提出的问题和功能的。
      4、你还应该包括对于相关的行业规范、标准和法律法规的调研内容。
    如果提供了**原先的输出**，你应该根据**用户的修改意见**在你原先输出的基础上进行改进
    如果没有提供则你可以忽略并重新生成。
    
    以下是**用户的需求描述**：
    {Description}
    以下是**远景和范围文档的结构**：
    {document_format_reference}
    以下是你**原先的输出**：
    {original}
    以下是来自**用户的修改意见**：
    {feedback}
  expected_output: >
    一份调研报告,使用markdown格式进行写作，内容包括：
    1、市场上主要的类似软件项目列表及其相关信息。
    2、从核心功能、软件特征、软件外部实体等方面的对比分析。
    3、针对需求中描述的问题现有软件项目的解决方案与解决程度。
    4、相关的行业规范、标准和法律法规的调研内容。
  agent: SoftwareManager

draft_context_diagram_task:
  description: >
    根据提供的**现有方案调研结果**和**来自用户的项目描述**创建一份**上下文图**（Context Diagram）。

    **上下文图**包括系统外的以某种方式与系统交互的外部实体，以及外部实体和系统之间的交互流。

    你需要结合**现有方案调研结果**和**来自用户的项目描述**中的内容从给定的资料中识别所有需要的参与系统交互的外部实体以及他们与系统的互动方式，这些外部实体包括但不限于：
    - 用户角色（Actors）
    - 外部子系统
    - 第三方平台或外部 API
    - 数据源或数据库
    - 外部组织或服务提供方

    将你识别出的外部实体作为**上下文图**的外部实体，你识别出的外部实体与系统的互动方式作为**上下文图**中外部实体和系统之间的交互流。

    如果提供了**原先的输出**，你应该根据**用户的修改意见**在你原先输出的基础上进行改进。
    如果没有提供则你可以忽略并重新生成。

    以下是**来自用户的项目描述**：
    {Description}
    以下是你**原先的输出**：
    {original}
    以下是来自**用户的修改意见**：
    {feedback}
    以下是参考的**现有方案调研结果**：
    {survey}
    
  expected_output: >
    输出一段使用 Mermaid 语法绘制的上下文图（必须放在代码块中），内容应包含：

    - 使用 "flowchart TD" 或 "flowchart LR" 结构
    - 一个表示系统的节点（例如："project System"），上下文图中表示系统的节点内部不能包含其他模块。
    - 所有识别到的外部实体节点
    - 明确展示系统与每个外部实体之间的输入/输出流（使用箭头表示方向）
    - 流名称应简洁描述数据/控制内容（如："Submit Request"、"Return Status"）
    - Mermaid 语法必须完全合法，可直接渲染，不得出现语法错误

  agent: SoftwareManager

user_introduction_draft_task:
  description: >
    基于 {project_name} 的调研文档，生成一份结构化的**用户类与特征**分析报告。
    你的任务是从**上下文图**中收集所有系统可能会涉及到的用户类别，并将这些用户类别作为输出。
    你应该从**上下文图**中的外部实体选择用户，同时将同一个外部实体分解成两类人也是禁止的。
    你绝对不能提到**上下文图**中没有提到的实体。
    对于每一类潜在用户群体，需要识别并分析：
      - 用户类别名称
      ️- 用户类别的人数估计
      - 用户画像（User Persona）
        * 人口特征、角色职责、技能水平、使用环境、数字化能力等。
        * 角色是对一个假设的、通用的人的描述，他作为一组具有相似特征和需求的用户的替身。您可以使用角色来帮助您了解要求，并设计用户体验，以最好地满足特定用户社区的需求。
          这是一个案例：Fred今年41岁，自14年前获得博士学位以来，一直是Contoso Pharmaceuticals的化学家。他对电脑没什么耐心。Fred通常在相关化学领域一次做两个项目。他的实验室里有大约300瓶化学品和气瓶。一天一般，他需要从仓库里来四种新化学品。其中两种是库存的商业化学品，一种需要订购，一种来自专有的Contoso化学样品。有时，Fred需要一种危险化学品，需要进行安全处理的特殊培训。当他第一次购买化学品时，Fred希望材料安全数据表自动通过电子邮件发送给他。每年，Fred都会合成大约20种新的专有化学品进入仓库。Fred希望自动生成他上个月的化学品使用报告，并通过电子邮件发送给他，以便他可以监控他的化学品暴露情况。
      - 用户类别描述：
        * 例如用户如何使用系统、使用频率、使用场景等。
          这是一个案例：”Chemists will request chemicals from vendors and from the chemical stockroom. Each chemist will use the system several times per day, mainly for requesting chemicals and tracking chemical containers into and out of the laboratory. The chemists need to search vendor catalogs for specific chemical structures imported from the tools they use for drawing structures.“
    
    如果提供了**原先的输出**，你应该根据**用户的修改意见**在你原先输出的基础上进行改进。
    如果没有提供则你可以忽略并重新生成。

    以下是你**原先的输出**：
    {original}
    以下是来自**用户的修改意见**：
    {feedback}
    以下是你可以参考的其他需求工件：
    {reference}

  expected_output: >
    输出一份使用表格组织的用户全体报告，可以包括多个表格。
    对每个用户群体，表格需要包含以下内容：
      - 用户群体（User Group）
      - 用户类人数估计
      - 用户类画像（Persona）
      - 用户类描述（Descrption）
    结果需结构清晰、内容完整，并逻辑上能从业务需求文档中推导。
    不需要使用 Mermaid 或其他图表形式。

  agent: SoftwareManager

draft_event_list_task:
  description: >
    结合**来自用户的项目描述**和**上下文图**为软件系统 {project_name} 创建一份**外部事件列表**。
    **上下文图**包括系统外的以某种方式与系统交互的外部实体，以及外部实体和系统之间的交互流。
    **外部事件列表**标识了可能触发系统中行为的外部事件。
    **外部事件列表**包括由用户或其他外部实体触发的业务事件、时间事件或从外部组件接收的信号事件来描述系统的范围边界。
    - 业务事件是人类用户与软件对话的行动，就像用户发起用例一样。业务事件触发了系统的主要业务流程。业务事件的事件响应序列对应于用例或泳道图中的步骤，只有业务事件可以发起用例，因此业务事件应该被额外标注。
    - 信号事件是当系统收到来自外部硬件设备或其他软件系统的控制信号、数据读取或中断时触发的事件。
    - 时间事件是由时间触发的，例如计算机时钟达到指定时间（例如，在午夜启动自动数据导出操作）或自上一个事件以来已经过预设持续时间时（如在传感器每10秒记录一次读取温度的系统中）。

    你的输出应该遵循下列条件：
    - 你的**外部事件列表**不能涉及**上下文图**中没有出现的外部实体，也不能漏掉外部实体。
    - 你的**外部事件列表**不能出现**上下文图**中没有出现的外部实体与系统之间的交互，也不能漏掉交互事件。
    - **外部事件列表**中的事件只能来自**上下文图**中外部实体触发的交互，不能来自系统本身触发的交互。
    - 业务事件识别：从**来自用户的项目描述**中辨别**上下文图**的交互中哪些来自外部实体的交互触发了系统的主要业务流程并将其作为业务事件
    - 时间事件识别：从**来自用户的项目描述**中辨别**上下文图**的交互中哪些来自外部实体的交互可能会由时间触发并将其作为时间事件
    - 信号事件识别：**上下文图**剩下的来自外部实体的交互作为信号事件
    
    如果提供了**原先的输出**，你应该根据**用户的修改意见**在你原先输出的基础上进行改进。
    如果没有提供则你可以忽略并重新生成。

    以下是你**原先的输出**：
    {original}
    以下是来自**用户的修改意见**：
    {feedback}
    这是**来自用户的项目描述**：
    {Description}
    这是你可以参考的**上下文图**：
    {context_diagram}
   
  expected_output: >
    输出一个结构化的文本形式的事件列表，标明系统必须响应的外部事件.
    这是一个案例：
    化学品追踪系统的外部事件（External Events for Chemical Tracking System）
    - 化学师提交化学品申请。（**业务事件**）
    - 扫描化学品容器的条形码。
    - 到达生成 OSHA 合规报告的时间点。
    - 供应商发布新的化学品目录。
    - 新的专有化学品被登记（收录）到系统中。
    - 供应商通知某种化学品处于缺货/延期交付状态。
    - 化学师请求生成其个人化学品暴露报告。（**业务事件**）
    - 从 EPA 接收到更新后的化学品安全数据表（MSDS）。
    - 新供应商被加入到首选供应商列表中。
    - 从供应商处接收到化学品容器。

  agent: SoftwareManager

draft_feature_tree_task:
  description: >
    根据**来自用户的项目描述**以及**现有方案调研**为软件系统 {project_name} 创建一份**系统特征树**。
    **系统特征树**是对产品特征的视觉描述，这些特征被组织成逻辑组，将每个特征分层细分为进一步的细节级别（Beatty and Chen 2012）。
    **系统特征树**提供了为项目计划的所有特征的简明视图，使其成为向想要快速浏览项目范围的高管展示的理想模型。
    **系统特征树**最多可以显示三个级别的特征，通常称为1级（L1）、2级（L2）和3级（L3）。L2特征是L1特征的子特征，L3特征是L2特征的子特征。

    如果提供了**原先的输出**，你应该根据**用户的修改意见**在你原先输出的基础上进行改进。
    如果没有提供则你可以忽略并重新生成。

    以下是你**原先的输出**：
    {original}
    以下是来自**用户的修改意见**：
    {feedback}
    以下是**来自用户的项目描述**：
    {Description}
    以下是**现有方案调研**：
    {initial_info}
    

  expected_output: >
    你应该使用结构化的文本形式输出特征树，包含以下主要部分：
    1. 特征树主体：
       - 使用**缩进列表**表示层次结构。
    2. 二级以及三级子特征
  agent: SoftwareManager

business_requirements_document_task:
  description: >
    根据给定的**需求工件**、**业务范围文档**以及来自用户的**项目需求描述**为{project_name}编写**远景和范围文档**的第{chapter_index}章，并严格遵循所提供的文档格式。
    收集并组织章节结构内部要求的所有内容。
    若参考资料中包含图表（如表格、Mermaid 图等），你必须在输出中重用并呈现这些图表,
    输出图表时你必须原原本本的复制输出这些图表，不得修改任何内容, 同时也必须保留输入图表中的对图表的重要的说明文字。
    如果参考的文档或图表太长导致无法全部放入，你必须指明可以在哪里找到完整版本（例如：附录中的用户介绍等部分）。
    
    以下是来自用户的**项目需求描述**：
    {Description}
    以下是**远景和范围文档**章节结构：
    {document_format_reference}
    以下是你可以参考的其他**需求工件**：
    {reference}

  expected_output: >
    你需要生成【一个且仅一个】章节的数据结构，用于表示业务需求文档中的一个完整章节。

    ===============================
    一、输出形式（必须严格遵守）
    ===============================

    最终输出必须是【一个合法的 JSON 对象】：
    - 不得在 JSON 前后添加任何说明文字
    - 不得使用 Markdown 代码块包裹
    - 所有键和值必须使用双引号
    - 不得包含注释
    - 不得有尾随逗号
    - 不得出现重复的键（key）
    - 不得出现重复的 chapter_index

    ===============================
    二、章节字典结构定义
    ===============================

    章节对象必须且仅能包含以下 4 个顶层字段：
    1. "chapter_index"
    2. "title"
    3. "structure"
    4. "subchapter"

    不允许在structure外部出现任何其他字段（例如：content、description 等）。

    -------------------------------
    1. chapter_index
    -------------------------------
    - 字符串类型
    - 使用点号（dot notation）的分层章节编号
    - 合法格式示例："2"、"2.1"、"2.1.1"
    - 在同一层级中必须唯一，不得重复

    -------------------------------
    2. title
    -------------------------------
    - 字符串类型
    - 表示当前章节的标题

    -------------------------------
    3. structure
    -------------------------------
    - 列表类型
    - 每一项为一个对象，用于描述【本章节内部的结构组成】
    - structure 中的对象必须满足以下规则：
      a. 每个对象只能包含【一个键值对】
      b. 键表示结构块名称（如："content"、"用户角色说明"、"内容说明" 等）
      c. 值是结构块对应得内容,可以包括整段的文段以及图表，文段使用markdown格式书写如果分点可以使用列表包裹，图表必须使用mermaid代码块包裹。
    - 如果章节本身没有明显的内部结构：
      必须使用键名 "content" 作为唯一结构块名称

    -------------------------------
    4. subchapter
    -------------------------------
    - 列表类型
    - 表示当前章节的子章节
    - 可以为空列表 []
    - 每一个子章节对象：
      必须【严格遵循与父章节完全相同的结构定义】
      （即同样只允许包含 chapter_index、title、structure、subchapter 四个字段）
    - 子章节的 chapter_index：
      必须以父章节的 chapter_index 作为前缀
      例如：父章节为 "2.1"，其子章节只能是 "2.1.1"、"2.1.2" 等

    ===============================
    三、严格禁止事项（必须遵守）
    ===============================

    - 禁止在章节对象或子章节对象中直接出现 "content" 字段
      （content 只能作为 structure 中的键名出现）
    - 禁止重复生成相同 chapter_index 的章节
    - 禁止在structure外部补充冗余字段

    ===============================
    四、参考结构说明
    ===============================

    以下结构仅作为格式参考，具体章节名称与层级需基于输入的 SRS 章节结构生成：

    {
      "chapter_index": "2",
      "title": "用户分析（User Analysis）",
      "structure": [
        {
          "content": "说明本章节在 SRS 中的作用以及包含的用户分析维度"
        }
      ],
      "subchapter": [
        {
          "chapter_index": "2.1",
          "title": "用户角色（Roles）",
          "structure": [
            {
              "用户角色说明": "说明本节将列出系统涉及的主要用户角色及其职责"
            }
          ],
          "subchapter": []
        }
      ]
    }

  agent: SoftwareManager



nfr_task:
  description: >
    根据**来自用户的项目描述**和给定的其他**需求工件**为软件系统 {project_name} 创建**非功能性需求**文档。
    识别所有软件可能需要的质量属性并记录下来。
    你可能会使用的软件质量属性包括：
    外部质量
      - 可用性：系统服务在何时何地需要时可用的程度
      - 可安装性：正确安装、卸载和重新安装应用程序的容易程度
      - 完整性：系统保护数据免受不准确和丢失影响的程度
      - 互操作性：系统与其他系统或组件互连和交换数据的容易程度
      - 性能：系统对用户输入或其他事件做出响应的速度和可预测性
      - 可靠性：系统在发生故障前持续运行的时间
      - 鲁棒性：系统对意外操作条件的响应能力
      - 安全性：系统防止对人员造成伤害或对财产造成损害的程度
      - 保密性：系统防止对应用程序及其数据进行未授权访问的程度
      - 易用性：人们学习、记忆和使用系统的容易程度
      - 合规性：系统遵守法律、法规和标准的程度
    内部质量
      - 效率：系统利用计算机资源的效率
      - 可修改性：维护、更改、增强和重组系统的容易程度
      - 可移植性：使系统在其他操作环境中工作的容易程度
      - 可复用性：组件可在其他系统中使用的程度
      - 可伸缩性：系统扩展以处理更多用户、事务、服务器或其他扩展的容易程度
      - 可验证性：开发人员和测试人员确认软件正确实施的容易程度

    step1: 识别所有需要的质量属性。
      你应该从业务需求文档中的利益相关者档案出发，从他们的角度思考上述的质量属性哪些对他们是最重要的，从而去除那些对利益相关者不敏感或者不重要的需求。
    step2: 对剩下的质量属性进行排序。
      对于不同的质量属性，你需要根据利益相关者的需求和项目的具体情况对它们进行排序，确定哪些质量属性是最重要的，哪些是次要的。
      你最后的生成应该最多只涉及三到四个度量指标。
    step3: 对于每种质量属性提出具体的标准。
      你需要为每种质量属性提出具体的标准。
      试着借鉴这些案例问题： 
      - 检索典型专利申请以响应查询的合理或可接受的响应时间是多少？
      - 系统在高峰使用时段内需要支持多少并发用户？
      - 对于典型查询，用户会认为什么是不可接受的响应时间？
      - 您预计平均有多少同时用户？
      - 一天、一周、一个月或一年中的哪些时间比平时使用量大得多？
      你还可以思考，什么情况下会导致用户不可接受的质量属性。
    step4: 组织并输出最终的质量属性文档。
      最后一步是从得出的有关每个质量评估项目的信息中制定具体且可验证的要求。在编写质量要求时，请记住有用的SMART助词——使它们具有具体性、可衡量性、可实现性、相关性和时间敏感性.
      

    如果提供了**原先的输出**，你应该根据**用户的修改意见**在你原先输出的基础上进行改进。
    如果没有提供则你可以忽略并重新生成。

    以下是你**原先的输出**：
    {original}
    以下是来自**用户的修改意见**：
    {feedback}
    这是**来自用户的项目描述**：
    {Description}
    以下是你可以参考的其他**需求工件**：
    {reference}
   

  expected_output: >
    按照markdown格式分条输出所有需要的质量保证。
    你可以把这些例子作为输出格式的参考：
    "系统应在当地时间上午9:00至10:00的高峰使用时段内，容纳总计400名用户，并支持最多100名并发用户，预计平均会话时长为8分钟。"
    "95%的新用户应在首次尝试时能够成功无误地完成订餐。"
    "用户应能查看任何菜单项的所有成分列表，并且对已知在北美人群中引发过敏反应率超过0.5%的成分进行高亮显示。"
  agent: SoftwareManager


usage_scenario_task:
  description: >
    根据提供的**用例**，
    为软件系统 {project_name} 系统性地识别和枚举**使用场景**。
    情景是对系统使用的单个实例的描述。因此，**用例**是相关**使用场景**的集合，**使用场景**是**用例**的特定实例。
    在探索用户需求时，您可以从**用例**开始，并制定更具体的使用场景
    **使用场景**是关于特定人员在特定工作背景下在特定现有工作环境中进行工作活动的故事，以具体的叙事风格讲述，仿佛它是真实使用事件的转录。
    Scenarios reveal and facilitate agreement on requirements and evoke thought and discussion about requirements, design, user experience goals, and testing strategy.
    
    以下是你可以参考的**需求工件**：
    {reference}

  expected_output: >
    输出一组结构化的使用场景列表，大约3-6个，
    你所输出的使用场景绝对不能包含用例中没有提到的角色，只能在用例已经有的范围内进行编写。
    使用场景应该包含如下结构:
    ▪ Agents (users, people in work roles, often in personas, system, sensors)
    ▪ User goals and intentions
    ▪ User background, training, needs, etc.
    ▪ Reflections on work practice, including user planning, thoughts, feelings, and reactions to system
    ▪ User actions and user interface artifacts
    ▪ System responses, feedback
    ▪ User tasks, task threads, workflows, including common, representative, mission critical, and error and recovery situations
    ▪ Environmental and work context (e.g., phone ringing)
    ▪ Barriers, difficulties encountered in usage
    ▪ And, of course, a narrative, a story that plays out over time
    
    
  agent: SoftwareManager


use_case_draft_task:
  description: >
    你需要根据给定的**上下文图**和**外部事件列表**和**用户类与特征**为软件项目 {project_name} 写一组用例（Use Cases）。
    你还可以参考来自用户的**初始需求**
    用例描述了系统和外部行为者之间的一系列互动，导致行为者能够实现一些有价值的结果。用例的名称总是以动词后跟宾语的形式书写。
    选择强有力的描述性名称，从名称中可以明显看出用例将为一些用户提供有价值的东西。

    你应该按照以下方式识别用例：
    1、从**上下文图**中提取发起用例的**主要参与者**，并根据**用户类与特征**获得他们对系统的需求，记住，用例中的**主要参与者**必须来自用户类，
    2、从**外部事件列表**确定**主要参与者**相关的业务事件，从业务事件开始导出用例。
    然后将这些事件与**次要参与者**、**次要参与者**相关的其他外部事件以及特定用例联系起来，**次要参与者**应该是**上下文图**中提到的外部实体。
    你的输出必须是一组用户用例，并以**字典列表（list of dictionaries）**进行存储。
    每个字典代表一个完整的 Use Case。
    每个 Use Case 字典必须包含以下字段（字段名必须完全一致）：
    - "use_case_name": 用例名称，简短且具描述性。
    - "primary_actor": **主要参与者**，发起该用例的主要用户或系统。
    - "secondary_actor": **次要参与者**，即参与或辅助该用例的其他用户、系统或外部实体。
    - "use_case_description": 一段描述用例目的与范围的短文本。
    - "trigger": 导致用例开始的事件或条件。
    - "preconditions": 用例开始前的先决条件，先决条件定义了在系统开始执行用例之前必须满足的先决条件。系统应该能够测试所有先决条件，看看是否可以继续使用案例。
      先决条件可以描述系统状态（对于从自动取款机提取现金的用例，自动取款机必须包含资金，对于需要账户登录的例子，用户必须首先登录），
      但它们不能描述用户的意图（“我需要一些现金”），也不能描述任何除了系统内部状态和行为以外的内容。
    - "postconditions": 用例结束后必须满足的后置条件。后条件描述了使用案例成功执行后的系统状态。
      后条件可以描述：
        用户可以观察到的东西（系统显示帐户余额）。
        物理结果（自动取款机已分配资金并打印收据）。
        内部系统状态变化（账户已被扣除现金提取金额，外加任何交易费用）。
      但它们不能描述用户的意图（“我需要一些现金”），也不能描述任何除了系统内部状态和行为以外的内容。
    - "main_flow": 正常流程被写成一个编号的步骤列表，指示哪个实体——系统或特定行为者——执行每个步骤。
    - "alternative_flows": 替代流程提供的业务结果与正常流程相同（有时有差异），但在任务的具体内容或完成方式上代表较少常见或优先级较低的变化。
      正常流程可以在对话框序列的某个决策点分支为替代流程；它以后可能会（也可能不）重新加入正常流程。
      正常流程中的步骤指示了用户可以分支到替代流程的位置。
    - "exception_flows": 有可能阻止用例成功的条件被称为例外。例外情况描述了在用例执行期间可能出现的预期错误情况以及如何处理它们。
      在某些情况下，用户可以从异常中恢复，也许通过重新输入一些不正确的数据。然而，在其他情况下，用例必须在没有达到成功条件的情况下终止。
    - "priority": 该用例的重要性或实施优先级（如 High / Medium / Low）。
    - "business_rules": 影响或约束用例的业务规则列表。
    - "assumptions": 用例依赖的假设条件列表。
    - "other_constraints": 其他未归类但仍相关的限制、备注或规则。

    由于系统总是参与用例因此primary_actor和secondary_actor都不应该包含系统本身，在写作时仅需以"系统"代指即可。
    在系统用例中只能记录和本系统有关的步骤和状态例如用户对系统的操作例如“用户点击报表生成按钮”以及系统的反馈以及状态转换，
    不应该描述用户自身的状态例如“用户分析系统给出的报表”

    如果提供了**原先的输出**，你应该根据**用户的修改意见**在你原先输出的基础上进行改进。
    如果没有提供则你可以忽略并重新生成。

    以下是你**原先的输出**：
    {original}
    以下是用户的**初始需求**：
    {Description}
    以下是来自**用户的修改意见**：
    {feedback}
    以下是你可以参考的**需求工件**：
    {reference}
    
  expected_output: >
    最终输出必须是有效的 JSON 风格字典（Python 字典格式也可以），
    且不得包含任何解释性文字。
    输出中必须只包含用例字典组成的列表，且可以直接写入文件。
    所有的列表内部元素只能是字符串。
    示例格式如下：
    [
      {
        "use_case_name": "",
        "primary_actor": "",
        "secondary_actor": [],
        "trigger": "",
        "use_case_description": "",
        "preconditions": [],
        "postconditions": [],
        "main_flow": [],
        "alternative_flows": [],
        "exception_flows": [],
        "priority": "",
        "business_rules": [],
        "assumptions": [],
        "other_constraints": []
      }
    ]

  agent: SoftwareManager

state_transition_diagram_task:
  description: >
    你的任务是根据**用例**为关键业务对象建立**状态转换图**。
    软件系统涉及功能行为、数据操作和状态更改的组合。
    **状态转换图**提供了对象或系统状态的简洁、完整和明确的表示。**状态转换图**直观地显示了状态之间可能的转换。
    **状态转换图**和状态表提供了一个跨越多个用例或用户故事的高级视图，每个用例或用户故事都可能执行从一个状态到另一个状态的转换。
    它们只显示了处理过程中可能发生的状态变化，帮助开发人员理解系统的预期行为。
    STD包含三种类型的元素：
    - 可能的系统状态，显示为矩形。
    - 允许的状态更改或转换，显示为连接矩形对的箭头。
    - 导致每个转换发生的事件或条件，在每个转换箭头上显示为文本标签。标签可以标识事件和相应的系统响应。
    **状态转换图**的主体是业务中具有生命周期的关键对象。
    经过定义的生命周期的对象的STD将具有一个或多个终止状态，这些状态表示对象可以具有的最终状态值。终止状态有进入的转换箭头，但没有出去的转换箭头。
    你应该满足如下规则：
    - 你应该根据不同**用例**涉及的范围提取出对于系统业务最重要的外部实体(不超过三个)，并为这些外部实体各自创建一个**状态转换图**
    - 对于每一个**状态转换图**，你应该根据不同**用例**给出的preconditions和postconditions来决定业务对象可能出现的所有状态
    - 对于每一个**状态转换图**，你应该根据不同**用例**给出的main_flow、alternative_flow和exception_flows来决定可能出现的业务对象的状态之间可能的状态转换方式
    
    以下是你可以参考的**需求工件**：
    {reference}


  expected_output: >
    输出一段使用 Mermaid 语法绘制的状态转移图代码（必须放在代码块中），其内容应包含：
    - 使用 stateDiagram-v2 结构
    - 明确列出系统所有关键状态
    - 标注每个状态之间的转移关系（含触发事件）
    - 如有必要，包含复合状态（Composite States）或并行状态
    - Mermaid 状态图语法必须完全合法，可直接渲染
    - 这是一个参考案例：
    课程状态机
    ```
    mermaid
    stateDiagram-v2
    %% =====================
    %% States
    %% =====================
    state "In Preparation" as InPreparation
    state "Postponed" as Postponed
    state "Accepted" as Accepted
    state "Placed" as Placed
    state "Back-Ordered" as BackOrdered
    state "Fulfilled" as Fulfilled
    state "Canceled" as Canceled

    %% =====================
    %% Transitions
    %% =====================

    %% In Preparation <-> Postponed
    InPreparation --> Postponed : requester saves\nincomplete request
    Postponed --> InPreparation : requester retrieves\nincomplete request

    %% In Preparation -> Accepted
    InPreparation --> Accepted : system accepts\nvalid request

    %% Accepted transitions
    Accepted --> Fulfilled : chemical stockroom\nfills request
    Accepted --> Placed : buyer places order\nwith vendor
    Accepted --> Canceled : requester cancels request

    %% Placed transitions
    Placed --> Fulfilled : chemical received\nfrom vendor
    Placed --> BackOrdered : vendor places chemical\non back-order
    Placed --> Canceled : buyer cancels vendor order

    %% Back-Ordered transitions
    BackOrdered --> Fulfilled : chemical received\nfrom vendor
    BackOrdered --> Canceled : buyer cancels vendor order

    %% Postponed -> Canceled
    Postponed --> Canceled : requester cancels request

    ```

  agent: SoftwareManager

erd_task:
  description: >
    根据给定的**数据流图**、**上下文图**和来自用户的**项目描述**为软件系统 {project_name}，创建一份完整的**实体关系图**。
    你的**实体关系图**应该反映来自问题域的逻辑信息组及其相互联系。
    实体关系图中的实体可以代表物理项（包括人员）或数据聚合，这些数据对您正在分析的业务或您打算构建的系统很重要。实体被命名为单数名词，并在ERD中以矩形显示。
    每个实体由一个或多个属性描述；实体的单个实例将具有不同的属性值。例如，每种化学物质的属性包括一个唯一的化学标识符、其化学名称及其化学结构的图形表示。
    **实体关系图**中的方块代表关系，它们确定了实体对之间的逻辑联系。关系的命名方式描述了联系的性质。
    每个关系的基数和多重性应该被标明。

    你应该满足如下规则：
    - 你应该从**上下文图**中识别实体关系图的物理项，从**数据流图**中识别实体关系图的数据聚合项,并且为各个实体标注一个或多个属性值。
    - 根据**上下文图**和**数据流图**中的交互决定实体关系图中的实体之间的交互

    以下是用户的**项目描述**：
    {Description}
    以下是你可以参考的**需求工件**：
    {reference}
  expected_output: >
    输出一份使用 Mermaid 语法绘制的 **实体关系图**，并置于代码块中。
    图表必须满足：
    - 使用 erDiagram 语法
    - 包含所有识别出的实体及其属性
    - 明确展示实体之间的关系及其基数
    - 标注主键和外键
    - 图中逻辑结构必须清晰，并且直接来源于用户用例与业务流程
    - Mermaid 语法必须完全合法，可直接渲染
    
    这是一个案例：
    erDiagram
    CHEMICAL_STOCKROOM_INVENTORY {
        string inventory_id PK
        string stockroom_name
        string location
        string manager_name
        datetime last_audit_time
        string status
    }

    CHEMICAL_CONTAINER {
        string container_id PK
        string inventory_id FK
        string chemical_id FK
        float quantity
        string unit
        string container_type
        date expiration_date
        string storage_condition
        string safety_level
        string status
    }

    CHEMICAL {
        string chemical_id PK
        string chemical_name
        string cas_number
        string formula
        string hazard_class
        string msds_url
        string physical_state
        boolean regulated
    }

    CONTAINER_HISTORY {
        string history_id PK
        string container_id FK
        datetime operation_time
        string operation_type
        float quantity_change
        string operator
        string remark
    }

    CHEMICAL_REQUEST {
        string request_id PK
        datetime request_time
        string requester_id FK
        string request_status
        string purpose
        datetime approval_time
    }

    REQUESTER {
        string requester_id PK
        string requester_name
        string department
        string role
        string contact_info
        boolean certified
    }

    VENDOR_CATALOG {
        string vendor_id PK
        string vendor_name
        string chemical_id FK
        string catalog_number
        float unit_price
        string supply_grade
        string lead_time
    }

    CHEMICAL_STOCKROOM_INVENTORY ||--o{ CHEMICAL_CONTAINER : storing
    CHEMICAL_CONTAINER }o--|| CHEMICAL : containing
    CHEMICAL_CONTAINER ||--|| CONTAINER_HISTORY : tracking
    CHEMICAL_CONTAINER }o--|| CHEMICAL_REQUEST : fulfilling
    CHEMICAL_REQUEST }o--o{ CHEMICAL : listing
    CHEMICAL_REQUEST }o--|| REQUESTER : placing
    CHEMICAL }o--o{ VENDOR_CATALOG : listing

  agent: SoftwareManager


data_flow_diagram_draft_task:
  description: >
    基于软件系统 {project_name} 的**用户用例**以及**上下文图**还有来自用户的**项目描述**，
    生成一份结构化的**数据流图**。
    **数据流图**标识系统的转换过程、系统操纵的数据或物理材料的收集（存储），以及数据或材料在过程、存储和外部世界之间的流动。数据流建模采用函数分解方法进行系统分析，将复杂问题分解为渐进式细节水平。
    **数据流图** 必须准确反映用例和系统交互中隐含的**处理过程（Processes）**、**外部实体（External Entities）**、**数据流（Data Flows）**、和 **数据存储（Data Stores）**。
    具体来说，你可以将上下文图视为**数据流图**的第 0 级（Level-0），
    并基于用例细化到第 1 级（Level-1）或更高层级。

    你必须完成以下任务：
    - 从**用户用例**中提取所有 **处理过程（Processes）**，
      例如主流程中对数据进行转换、验证或路由的步骤。
    - 从**上下文图**以及用例中的参与者（Actors）推导 **外部实体（External Entities）**。
    - 从用例中的输入、输出、前置条件、后置条件、系统响应中识别 **数据流（Data Flows）**。
    - 从业务领域、用例假设、系统需求等来源识别 **数据存储（Data Stores）**
    - 确保**数据流图**展示清晰、统一且可追溯的系统信息流，涵盖所有参与者与处理过程。

    以下是来自用户的项目描述：
    {Description}
    以下是你可以参考的**需求工件**：
    {reference}

  expected_output: >
    输出一份使用 Mermaid 语法绘制的 **数据流图**（从LEVEL-0到Level-1），并置于代码块中。
    图表必须满足：
    - 使用 flowchart 语法（例如 "flowchart TD" 或 "flowchart LR"）
    - 包含以下类型节点：
        * 处理过程（Processes）
        * 外部实体（External Entities）
        * 数据存储（Data Stores）
    - 所有数据流必须使用方向箭头表示
    - 图中逻辑过程必须清晰，并且直接来源于用户用例与上下文图
    - Mermaid 语法必须完全合法，可直接渲染

  agent: SoftwareManager

dialog_map_draft_task:
  description: >
    基于**用例**创建一份完整的**对话图**，以捕获用户与系统之间的交互结构。
    **对话图**代表了一个高抽象层次的用户界面设计。
    它显示了系统中的对话框元素以及它们之间的导航链接，但它不显示详细的屏幕设计。
    用户界面可以被视为一系列状态变化。只有一个对话框元素（如菜单、工作区、对话框、行提示，或触摸屏显示器）在任何给定时间可用于用户输入。
    用户可以基于他在活动输入位置处采取的动作导航到某些其他对话框元素。
    在一个复杂的系统中，可能的导航路径可能很大，但数量是有限的，选项通常是已知的。
    你应该从给定的用例中提取用户交互中用户界面状态的可能变化，不能创造多余的也不能漏掉原有的内容。
    **对话图**实际上是一个以状态转换图的形式建模的用户界面。
    就像在普通的状态转换图中一样，**对话图**将每个对话框元素显示为一个状态（矩形）和每个允许的导航选项作为转换（箭头）。
    触发用户界面导航的条件显示为转换箭头上的文本标签。有几种类型的触发条件：
    - 用户操作，例如按下功能键，单击超链接或在触摸屏上做出手势。
    - 一种数据值，如触发错误消息显示的无效用户输入值
    - 一种系统条件，如检测到打印机缺纸
    - 这些条件的某种组合，如键入菜单选项编号并按Enter键。

    以下是你可以参考的**需求工件**：
    {reference}

  expected_output: >
    输出一份使用 Mermaid 语法绘制的 **对话框映射（Dialog Map）**，并放置在代码块中。要求：
      - 使用 flowchart 语法（如 "flowchart TD" 或 "flowchart LR"）
      - 充分包含用例中的内容
      - 把需要在对话框中展示的元素作为节点
      - 把系统的行为作为边

    这是一个案例：
    flowchart TD
    %% ========== Start / End ==========
    Start((Start))
    End((Exit))

    %% ========== Core States ==========
    CRL[Current Request List]
    ECR[Enter Chemical to Request]
    LSC[List of Stockroom Containers]
    LV[List of Vendors for Chemical]
    CH[Container History]
    CONF[Confirm Request Is Accepted]
    ERR[Display Error Message]

    %% ========== Start ==========
    Start -->|ask to place a request| CRL

    %% ========== Current Request List ==========
    CRL -->|request another chemical| ECR
    CRL -->|delete chemical from list| CRL
    CRL -->|cancel entire request| End
    CRL -->|submit request for >0 chemicals| CONF

    %% ========== Enter Chemical ==========
    ECR -->|invalid chemical| ERR
    ERR -->|OK| ECR

    ECR -->|request chemical from stockroom| LSC
    ECR -->|request chemical from vendor| LV
    ECR -->|cancel addition of new chemical| CRL

    %% ========== Stockroom Containers ==========
    LSC -->|select container and add to list| CRL
    LSC -->|request a different chemical| ECR
    LSC -->|ask to see container history| CH
    CH -->|return| LSC
    LSC -->|cancel addition of new chemical| CRL

    %% ========== Vendors ==========
    LV -->|select vendor and add chemical to list| CRL
    LV -->|request a different chemical| ECR
    LV -->|cancel addition of new chemical| CRL

    %% ========== Confirm ==========
    CONF -->|OK| End


data_dictionary_draft_task:
  description: >
    基于软件系统 {project_name} 的**实体关系图**和来自用户的**项目描述**，
    构建一份完整且结构良好的 **数据字典**。
    **数据字典**是有关应用程序中使用的数据实体的详细信息的集合。将有关组成、数据类型、允许值等的信息收集到共享资源中，可以识别数据验证标准，帮助开发人员正确编写程序，并最大限度地减少集成问题。
    对于给定的**实体关系图**你应该思考，其中的数据实体对应的复合字段内部应该包含什么字段以及实体间的关系对这些字段会有什么影响。
    **数据字典**必须准确描述出现在以下位置的所有数据元素：
      - 实体关系图中的数据实体
      - 实体关系图中的数据实体之间的数据关系

    对于每一个识别出的数据项，你必须明确给出：
      - 数据名称（Name）
      - 数据类型（Type，例如 string、integer、object、list）若为复合数据，需列出内部字段与属性
      - 描述（Description）：说明该数据在业务中的实际含义
      - 长度（Length）：如适用，指定最大长度或范围
      - 数值：对于数值本身的解释，可以包括单位，生成方式或者其他对于数值本身的解释。


    以下是来自用户的**项目描述**:
      {Description}
    以下是你可以参考的**需求工件**：
      {reference}

  expected_output: >
    输出一份完整的 **数据字典（Data Dictionary）**，数据字典应该按照表格方式组织,使用mermaid代码块包裹。
    输出必须包含：
    - 一个数据字段表格：汇总所有数据项，包括简单字段以及复合字段，每个数据项一行
      - 对于复合数据类型，需要在表格中标明其内部字段，其内部字段应该被纳入数据字典中，且在表格中具有专门的一行。
      - 数据字典应该按照数据名称的字母序排列。


SRS_planning_task:
  description: >
    你是一名资深的软件需求工程师与提示词架构设计专家，
    擅长根据**需求工程工件**和**SRS章节示例**编写可执行、可复用、可自动化的章节级写作提示词。

    本任务的目标不是编写软件需求规格说明书（SRS）的正文内容，
    而是为“如何编写某一章节”生成一个**章节级写作提示词**（Chapter Writing Prompt），
    该提示词将被下游的大语言模型直接使用，用于生成具体章节内容。

    在本任务中，你将获得：
    - 一个已经完成或部分完成的**SRS章节示例**
    - 这个章节在内容上的**依赖章节的内容**
    - 一组可用的**需求工程工件**（Artifacts），包括但不限于：
      业务流程模型、状态转移图、特征树、上下文图、用户介绍、
      数据流图、数据字典、对话图、业务需求文档（BRD）、
      用户用例、调研报告、非功能性需求等

    你的核心职责是对给定章节进行“反向工程分析”，
    不仅提炼其写作结构、写作方式与格式约束，
    还需要明确：
    - 该章节**依赖哪些需求工件**
    - 每一类工件在该章节写作中**应当如何被使用**
    如果本节没有可用的需求工件，忽略对于工件的分析。
    另一方面，对于应该由人类进行填写的功能性而非内容型的章节例如版本文档记录，你只需要原样输出其内容即可，不要做任何改动。

    在分析与生成过程中，请严格遵循以下原则：

    一、只分析“写法”，不分析或复述具体业务内容；
    二、章节写作应被视为对多个需求工件的**整合性表达**，
       而不是孤立的信息来源；
    三、明确区分：
       - 主输入工件（直接驱动章节内容）
       - 辅助约束工件（用于校验一致性或补充边界）
       - 背景参考工件（仅用于理解上下文，不应直接展开）
    四、不得将工件内容原样复制进提示词，
       而应说明“如何利用该工件进行写作”。

    在分析过程中，请至少覆盖以下维度：

    1. 章节结构（Structure）
       - 章节与子章节的层级组织方式
       - 各子章节在文档中的功能角色

    2. 写作模式（Writing Patterns）
       - 信息是通过流程建模、状态建模、表格、枚举还是约束性陈述来表达
       - 是否以图表为主、文字为辅，或完全结构化表达
       - 尤其是注意文档案例中那些以特殊格式（mermaid 表格、mermaid diagram）表达的章节部分

    3. 格式与约束（Format & Constraints）
       - 必须使用或禁止使用的格式（如 Mermaid、表格、编号规则）
       - 明确禁止出现的内容类型（如实现细节、技术架构）

    4. 需求工件依赖与使用方式（Artifact Dependency & Usage）
       - 明确本章节依赖的需求工件类型
       - 对每一类工件，说明：
         * 它为本章节提供什么信息
         * 这些信息应如何被转化为章节内容

    5. 章节依赖与使用方式
       - 根据本章节可能依赖的其他章节的内容简介，规划如何使用其他章节的内容促进本章节的写作。 

    在完成分析后，
    请基于上述抽象结果生成一个完整、可复用的【章节写作提示词】，
    该提示词应能够指导大语言模型在不同项目中，
    在保持写作风格与结构一致的前提下，
    正确、受控地利用所依赖的需求工件完成章节写作。

    以下是本章节对应的**SRS章节示例**：
    {SRS_example}
    以下是本章节相关**需求工程工件**的需求工件介绍：
    {SRS_reference}
    以下是本章节**依赖章节的内容**介绍：
    {dependence_chapter_content}
    

  expected_output: >
    输出一个完整、独立、可复用的【章节写作提示词（Chapter Writing Prompt）】。
    你的思考过程不输出。
    该写作提示词必须明确包含以下内容：

    1. 章节写作目标与用途说明
    2. 明确的章节结构与子章节组织规则
    3. 本章节所依赖的需求工件列表
    4. 针对每一类需求工件的使用说明，包括：
       - 在章节写作中应关注该工件的哪些信息
       - 这些信息应如何转化为章节内容
    5. 章节写作的格式规则与内容边界约束
    6. 你的输出应该鼓励大模型根据工件（如果有）填写章节对应结构的具体内容，而非泛泛而谈。

    输出内容应为直接面向大语言模型的写作指令文本，
    不包含任何具体业务实例或领域细节，
    可直接用于自动化 SRS 生成流程中的章节写作任务。

  agent: SoftwareManager

SRS_draft_task:
  description: >
    根据提供的**SRS章节结构**、相关的**需求工件**以及**依赖章节的内容**，
    根据输入的信息按照给定的结构为项目编写软件需求规格说明书的第 {chapter_index} 章。
    {prompt}

    若参考资料中包含图表（如表格、Mermaid 图等），你必须在输出中重用并呈现这些图表,必须原样复制，不得修改,强烈建议同时也保留图表文件中对图表的其他说明文字。
    当提供的图表的内容与某个章节的内容有关时，你必须把图表完整的作为附加材料进行添加。
    你必须根据图表的含义自行判断其正确的放置位置，所有的图表都应该被放入章节内容中，你填入的所有图表本身都应该使用markdown格式或用mermaid代码段包裹起来。
    如果参考的文档或图表太长导致无法全部放入，你必须指明可以在哪里找到完整版本（例如：你输入中的用户介绍等部分）。
    如果你引用了需求工件的一部分（例如某一条功能需求或者某一条非功能需求，请注明你引用的部分来自于哪个需求工件，例如"这一条对应功能需求中的FR-001"

    这是这一章的**SRS章节结构**：
    {SRS_chapter_structure}
    以下是你可以使用的相关**需求工件**：
    {reference}
    以下是该章节**依赖章节的内容**：
    {chapter_reference}

  expected_output: >
    你需要生成【一个且仅一个】章节的数据结构，用于表示软件需求规格说明书（SRS）中的一个完整章节。

    ===============================
    一、输出形式（必须严格遵守）
    ===============================

    最终输出必须是【一个合法的 JSON 对象】：
    - 不得在 JSON 前后添加任何说明文字
    - 不得使用 Markdown 代码块包裹
    - 所有键和值必须使用双引号
    - 不得包含注释
    - 不得有尾随逗号
    - 不得出现重复的键（key）
    - 不得出现重复的 chapter_index

    ===============================
    二、章节字典结构定义
    ===============================

    章节对象必须且仅能包含以下 4 个顶层字段：
    1. "chapter_index"
    2. "title"
    3. "structure"
    4. "subchapter"

    不允许在structure外部出现任何其他字段（例如：content、description 等）。。

    -------------------------------
    1. chapter_index
    -------------------------------
    - 字符串类型
    - 使用点号（dot notation）的分层章节编号
    - 合法格式示例："2"、"2.1"、"2.1.1"
    - 在同一层级中必须唯一，不得重复

    -------------------------------
    2. title
    -------------------------------
    - 字符串类型
    - 表示当前章节的标题

    -------------------------------
    3. structure
    -------------------------------
    - 列表类型
    - 每一项为一个对象，用于描述【本章节内部的结构组成】
    - structure 中的对象必须满足以下规则：
      a. 每个对象只能包含【一个键值对】
      b. 键表示结构块名称（如："content"、"用户角色说明"、"内容说明" 等）
      c. 值是结构块对应得内容使用markdown格式书写，可以包括整段的文段以及图表，如果使用图表必须使用mermaid代码块包裹,如果分点可以使用列表包裹。

    - 如果章节本身没有明显的内部结构：
      必须使用键名 "content" 作为唯一结构块名称

    -------------------------------
    4. subchapter
    -------------------------------
    - 列表类型
    - 表示当前章节的子章节
    - 可以为空列表 []
    - 每一个子章节对象：
      必须【严格遵循与父章节完全相同的结构定义】
      （即同样只允许包含 chapter_index、title、structure、subchapter 四个字段）
    - 子章节的 chapter_index：
      必须以父章节的 chapter_index 作为前缀
      例如：父章节为 "2.1"，其子章节只能是 "2.1.1"、"2.1.2" 等

    ===============================
    三、严格禁止事项（必须遵守）
    ===============================

    - 禁止在章节对象或子章节对象中直接出现 "content" 字段
      （content 只能作为 structure 中的键名出现）
    - 禁止重复生成相同 chapter_index 的章节
    - 禁止在structure外部补充冗余字段

    ===============================
    四、参考结构说明
    ===============================

    以下结构仅作为格式参考，具体章节名称与层级需基于输入的 SRS 章节结构生成：

    {
      "chapter_index": "2",
      "title": "用户分析（User Analysis）",
      "structure": [
        {
          "content": "说明本章节在 SRS 中的作用以及包含的用户分析维度"
        }
      ],
      "subchapter": [
        {
          "chapter_index": "2.1",
          "title": "用户角色（Roles）",
          "structure": [
            {
              "用户角色说明": "说明本节将列出系统涉及的主要用户角色及其职责"
            }
          ],
          "subchapter": []
        }
      ]
    }


  agent: SoftwareManager

extract_document_skeleton_task:
  description: >
    你是一名资深的软件需求工程师与技术文档结构分析专家，
    专长是从【需求文档示例】中抽取**可复用、可泛化、与具体业务完全解耦的文档结构骨架**
    （Document Skeleton / Chapter Template）。

    本任务的目标是：
    基于输入的需求文档案例，
    抽象出其背后的**通用需求文档模板结构**，
    包括：
      - 章节层级模式
      - 章节编号模式
      - 稳定重复出现的内部结构块

    ⚠️ 本任务是【结构抽象任务】，不是内容理解、内容总结或章节复述任务。

    ─────────────────────────────
    【强制约束规则】
    ─────────────────────────────

    1. 仅输出“模板级结构”，禁止输出任何案例语义
       - 不得出现任何具体业务对象、领域名词或操作行为；
       - 不得出现案例中的功能名称、角色名称、流程名称；
       - 所有章节标题必须是【模板化 / 占位化 / 泛化】表达。

    2. 章节标题必须进行“去业务化泛化”
       - ❌ 错误示例：用户登录、订单管理、场景 1、审批流程
       - ✅ 正确示例：
         * 功能需求模板
         * 场景模板（可重复）
         * 业务流程模板
         * 状态机模板
       - 标题应描述“结构角色”，而非“业务含义”。

    3. 章节编号需支持模板编号形式
       - 当章节在原文中出现多次、结构同构时：
         * 使用 x / n 等占位编号（如 3.x、6.x、5.1.x）；
         * 明确该章节为【可重复模板章节】。
       - 不要求保留原文中的具体数字序号。

    4. 抽取“功能性章节”的内部结构模板
       - 对于存在明确结构模式的章节，抽取其稳定结构块，例如：
         * 需求背景 / 目标
         * 前置条件
         * 业务流程
         * 页面交互（Frontend）
         * 逻辑处理（Backend）
         * 异常流程（Exception）
       - 若结构块内部存在子层级，需继续向下抽取。

    5. 严禁结构补全与经验推断
       - 只允许抽取文档中**明确出现的结构块类型**；
       - 不允许因“这是常见 PRD”而补充缺失结构；
       - 不允许标准化、改写或优化结构。

    6. 输出结果必须面向程序处理
       - 输出必须是严格的 JSON 或 YAML；
       - 仅描述结构与层级关系，不包含任何正文内容；
       - 输出结果应可直接作为：
         * PRD / SRS 模板
         * 文档结构校验规则
         * 自动生成目录的输入。

    请基于以下输入的【需求文档章节内容】进行结构抽象：
    {document_chapter}

  expected_output: >
    输出一份**章节结构骨架**，要求： 
    - 完整反映章节层级关系； 
    - 每个章节包含其下的子章节或结构块列表； 
    - 内容上必须使用中文。
    - 不包含业务中的具体内容； 
    - 结构清晰、层级正确、顺序一致； 
    - 可直接用于生成目录、模板或结构校验。 
    - 章节骨架应该是由字典组成的列表，其中每个字典表示一个章节，包含以下字段： 
      * chapter_index：章节编号（如 "6"、"6.1"、"6.1.1"） 
      * title：章节标题 
      * subchapter：子章节或结构块的列表 
      * structure：表示章节内部结构的，由字典组成的列表，以不同的字段作为键，值则是子章节对应部分的介绍，介绍包括内容介绍以及呈现的数据形式的介绍。 
      * 如果没有明显的结构则使用content作为字段。 对于结构同质的字章节应该被合并为相同的结构模板，只有一章表示，但合并以后的章节要做出注释表明该章节可以增加。
      输出格式示例（仅示意）：

    {
    "chapter_index": "6",
    "title": "功能需求详情",
    "subchapter": [
      {
        "chapter_index": "6.1",
        "title": "场景1 - 可以有多个场景及对应的并列章节",
        "structure": [
          {
            "对应痛点/场景": "说明该功能需求所对应的问题类型、使用场景或触发背景"
          },
          {
            "前置条件": "列出在执行该功能之前必须满足的用户状态、系统状态或权限条件"
          },
          {
            "业务流程": "描述该功能从触发到完成的主流程步骤，可包含关键分支但不涉及实现细节"
          },
          {
            "页面交互 (Frontend)": "描述与该功能相关的页面元素及用户交互方式",
            "structure": [
              {
                "字段定义": "列出页面中涉及的字段名称、字段类型及基本约束说明"
              },
              {
                "操作反馈": "描述用户操作后系统在界面层给予的提示、状态变化或反馈信息"
              }
            ]
          },
          {
            "逻辑处理 (Backend)": "描述系统在后台对该功能请求的处理逻辑",
            "structure": [
              {
                "Step 1 参数校验": "对输入参数或请求条件进行完整性、合法性校验"
              },
              {
                "Step 2 业务判断": "根据既定业务规则进行条件判断与流程分支控制"
              },
              {
                "Step 3 数据落库": "对相关数据进行创建、更新、删除或状态变更等持久化处理"
              }
            ]
          },
          {
