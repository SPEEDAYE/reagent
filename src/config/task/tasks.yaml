artifact_planning_task:
  description: >
    基于所提供的**需求文档章节结构**，以及系统可用**需求工件**的列表，
    推断每一章所需依赖的工件。输出必须严格为 Python 风格的列表套列表（list of lists），
    其中每个内部列表包含该章节所需的工件名称。

    针对文档结构中的每一章：
      1. 理解该章节的写作目的。
      2. 识别撰写该章节时必须引用或依赖的所有必要工件。
      3. 输出依赖时仅需工件名称（字符串），不需要附加理由。
      4. 最终输出必须是一个 list of lists，
         且每个索引对应文档结构中相同索引的位置。
      5. 章节结构将以列表的形式呈现，确保每个列表中的章节元素都有一个对应的子列表，
      6. 忽略附录章节，不需要为其生成子列表
    以下是你的参考**需求文档章节结构**：
    {document_structure}
    以下是**需求工件**的介绍信息：
    {artifact_to_choose}

  expected_output: >
    输出一个 Python 列表（list），其中的每个子列表（sub-list）代表对应章节所需的工件依赖。
    输出必须为合法的 Python 语法且不能包含额外注释。
    你的依赖输出应该以**大章**为单位，例如文档有十章就输出十个列表，不要为每个子章单独输出。
    并且每一章最好有多个工件依赖，除了与需求工件没有直接关系的章节例如版本记录和术语表，任何章节的依赖**不能为空**。
    与需求工件没有直接关系的章节的依赖设置为空。
    同时你的输出应该使用英文代号，即工件的唯一标识符，而不是中文名称。
    以下是工件的英文代号与名字的对应关系：
    上下文图 - context_diagram
    数据流图 - data_flow_diagram
    对话图 - dialog_map
    用户用例 - use_case
    用户角色介绍 - user_introduction
    需求背景描述 - survey
    状态转换图 - state_transition_diagram
    产品需求文档 - BRD
    实体关系图 - ERD
    外部事件列表 - event_list
    数据字典 - data_dictionary
    系统特征树 - feature_tree
    使用场景 - usage_scenario
    非功能性需求列表 - non_functional_requirements
    功能性需求列表 - functional_requirements
    
    示例输出格式：
      [
        ['context_diagram', 'survey'], # 第 1 章
        ['user_introduction', 'BRD', 'context_diagram'],    # 第 2 章
        ['use_case', 'dialog_map', 'context_diagram', 'data_flow_diagram'],     # 第 3 章
        ...
      ]

  agent: SoftwareManager

doc_content_task:
  description: >
    你是一名资深的软件需求工程师，精通软件需求规约（Software Requirements Specification, SRS）
    的结构化分析与文档方法论。

    请基于以下输入的**软件需求规约文档内容**，
    对文档的每一个章节进行分析与判定，明确说明：
    1. 该章节应包含的核心内容（关注信息类型，而非具体实现细节）
    2. 该章节在整份需求规约中的作用与价值（如：界定范围、支撑理解、约束设计、作为后续工件输入等）
    3. 该章节最合适的表述形式（如：说明性文字、结构化列表、表格、流程描述、约束声明、引用其他工件等）
    4. 你应该忽略附录，不需要为附录规划。
    本任务的目标是：
    - 帮助理解“每一章为什么存在”
    - 明确“这一章应该写什么、不应该写什么”
    - 为后续自动化生成、校验或重写 SRS 内容提供结构依据

    输入的软件需求规约文档内容如下：
    {SRS_Document_Content}

  expected_output: >
    输出应为一个列表（List），列表中的每一个元素对应软件需求规约中的一个章节，
    列表中的元素应该对应一级标题而不需要考虑更详细的二级子标题。
    且顺序应与原文档章节顺序保持一致。

    每个章节应以字典形式表示，至少包含以下字段：
    - chapter_index：章节编号（如 "1"、）
    - chapter_title：章节标题
    - chapter_role：该章节在整份需求规约中的作用说明
    - chapter_content_focus：该章节重点描述的内容类型与信息范围
    - recommended_expression_form：推荐的表述形式（如：叙述性说明、结构化条目、表格、约束列表、流程描述等）

    示例（仅示意）：
    [
      {
        "chapter_index": "1",
        "chapter_title": "引言",
        "chapter_role": "为读者建立对系统背景、目标和文档用途的整体认知",
        "chapter_content_focus": "系统目标、业务背景、读者对象、文档范围说明",
        "recommended_expression_form": "说明性文字为主，可辅以条目化列表"
      },
      {
        "chapter_index": "3",
        "chapter_title": "总体描述",
        "chapter_role": "从宏观层面界定系统边界与运行环境，为后续详细需求奠定上下文",
        "chapter_content_focus": "系统视角、用户角色、运行环境、约束与假设",
        "recommended_expression_form": "结构化小节 + 概念性描述，必要时引用上下文图"
      }
    ]

  agent: SoftwareManager

chapter_dependence_task:
  description: >
    你是一名资深的软件需求工程师，精通软件需求规约（SRS）的结构建模与章节依赖分析。

    请基于以下输入：
    **章节内容结构分析**（即对每一章的内容要点、作用和表述形式的判定），
    推导并确定软件需求规约中【一级章节】之间的内容依赖关系。

    本任务只关注一级标题（如 "1"、"2"、"3"），
    不分析二级及以下子章节之间的依赖。

    章节依赖关系的判定原则包括但不限于：
    1. 若某章节在理解、撰写或评审时，必须以前置章节所提供的概念、范围、角色、
       约束或定义为基础，则认为该章节依赖于前置章节。
    2. 若某章节在文档结构上起到“总体界定”“上下文建立”“术语与范围澄清”的作用，
       则通常会成为多个后续章节的依赖。
    3. 依赖关系体现的是【内容与语义上的前置关系】，而非文档的物理顺序或实现流程。
    4. 若两个章节在内容组织上相互独立，不应人为引入依赖关系。
    5. 忽略附录章节，不需要为其生成子列表
    6. 你生成的章节序号与章节总数应该与**章节内容结构分析**中的一致
    本任务的目标是：
    - 明确章节之间的内容前置关系
    - 支撑章节级写作顺序规划
    - 为后续章节生成、校验或自动化流水线提供依赖依据

    输入的**章节内容结构分析**如下：
    {doc_planning}
 

  expected_output: >
    输出应为一个 Python 字典（dict），
    采用【反向邻接表（reverse adjacency list）】的形式来表示章节依赖关系。

    其中：
    - 字典的 key 为某一个【一级章节编号】
    - value 为一个列表，表示该章节在内容上所依赖的其他一级章节编号
    - 若某章节不依赖任何其他章节，其 value 应为空列表

    输出示例（仅示意）：
    {
      "1": [],
      "2": ["1"],
      "3": ["1", "2"],
      "4": ["1", "2"],
      "5": ["3", "4"]
    }

  agent: SoftwareManager

fr_task:
  description: >
    你需要根据输入的**项目描述**和有关的**用例**为项目 {project_name} 编写一组结构化的功能需求（Functional Requirements, FR）。
    功能需求应明确描述系统应该执行的具体功能和行为，您可以从系统所做的事情或用户可以做的事情的角度来编写功能要求。
    因为有效的沟通是首要目标，所以将这些风格混合在一起，用更清晰的风格来措辞每个要求是可以的。
    以一致的方式陈述要求，例如“系统应”或“用户应”，然后是动作动词，然后是可观察到的结果。指定导致系统执行指定行为的触发操作或条件。
    从系统角度编写的要求的通用模板是：
      [optional precondition] [optional trigger event] the system shall [expected system response].
      这是一个案例：如果在化学品仓库中发现所要求的化学品，系统应显示目前仓库中所有化学品容器的列表。
    这是从用户角度编写需求的模板：
      The [user class or actor name] shall be able to [do something] [to some object] [qualifying conditions, response time, or quality statement].
      这是一个案例：
      化学家应该能够通过检索和编辑订单详细信息来重新订购他过去订购的任何化学品.
    您的写作风格应该将重点放在首位，即需求或功能的陈述，然后是支持细节（理由、来源、优先级和其他要求属性）。
    你的写作需求应该清晰简洁、使用主动语态，避免大段长叙述。
    当你编写需求时，尽量包括足够多的细节，以确保需求是可测试和可验证的。
    同时你应该避免使用模糊或主观的术语，例如“用户友好”、“高效”、“快速”等，你还需要确保需求的完整。
    以下是用户的**项目描述**：
    {Description}
    以下是相关的**需求工件**：
    {reference}
  expected_output: >
    输出一组结构化的功能需求（Functional Requirements, FR），
      每个需求应包含以下字段：
        - ID：唯一标识符，例如 FR-001、FR-002 等
        - 描述：按照模板描述功能需求
        - 来源：需求的来源（如用户用例、业务流程等）
        - 优先级：需求的优先级（高、中、低）、
          对系统具有重要性和紧急性的需求应该被标记为高优先级
          对系统具有重要性且不紧迫的需求应标记为中优先级
          对其余需求应标记为低优先级
        - 验证标准：描述如何验证该需求已被满足
    同时你应该按照用例组织功能需求
  agent: SoftwareManager

BRD_modify_task:
  description: >
    你的任务是为软件项目 {project_name} 中的需求工件设计修改意见：
    **根据用户反馈，明确每一个需要修改的工件应当做出哪些方面的改进。**
    在修改时可以参考来自用户的**项目需求**
    当用户要求对外部实体有关的内容进行修改时，你应该把上下文图纳入修改范围。
    这是来自用户的**项目需求**：
    {Description}
    以下是用户针对当前 BRD 的历史反馈信息：
